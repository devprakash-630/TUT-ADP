<!DOCTYPE html>
<html>
<head>
    <title>Styled Contact Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f4f4;
        }

        .xx {
            background-color: rgb(180, 226, 247);
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            margin-top: 60px;
            box-shadow: 0px 0px 10px rgb(165, 164, 164);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
        }
    </style>
</head>
<body>
<div class="xx">
    <h2>Contact Us</h2>
    <form>
        <label>Name:</label>
        <input type="text" class="form-control mb-3" placeholder="Enter your name">
        <label>Email:</label>
        <input type="email" class="form-control mb-3" placeholder="Enter your email">
        <label>Subject:</label>
        <input type="text" class="form-control mb-3" placeholder="Enter subject">
        <label>Message:</label>
        <textarea class="form-control mb-3" rows="4" placeholder="Type your message"></textarea>
        <button class="btn btn-primary">Send Message</button>
    </form>
</div>
</body>
</html>
